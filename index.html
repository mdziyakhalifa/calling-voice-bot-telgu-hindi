<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swar - Premium AI Voice Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-wave-square"></i>
                    <span>Swar AI</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="nav-conversation"><i class="fa-solid fa-message"></i> Conversation</a>
                <a href="#" class="nav-item" id="nav-history"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
                <a href="#" class="nav-item" id="nav-settings"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <div class="status-badge">
                    <span class="status-indicator"></span>
                    <span id="system-status">Checking Status...</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="chat-header">
                <div class="header-info">
                    <h2 id="header-title">Virtual Assistant</h2>
                    <p id="header-subtitle">Hindi & Telugu Supported</p>
                </div>
                <div class="header-actions">
                    <button class="action-btn" id="mobile-menu-btn" title="Menu"><i class="fa-solid fa-bars"></i></button>
                    <button class="action-btn" id="clear-chat-btn" title="Clear Chat"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </header>

            <!-- Conversation View -->
            <div id="view-conversation" class="view-section active">
                <div class="chat-container" id="chat-container">
                    <div class="message bot">
                        <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                        <div class="bubble">
                            <p>Namaste! Nenu me swar assistant ni. Aapko kaise help chahiye?</p>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="transcript-box" id="transcript-box">
                        <span class="transcript-label"><i class="fa-solid fa-ear-listen"></i> Listening:</span>
                        <span id="live-transcript" class="transcript-text">Waiting for voice...</span>
                    </div>

                    <div class="controls">
                        <div class="mic-wrapper">
                            <div class="pulse-ring ring-1"></div>
                            <div class="pulse-ring ring-2"></div>
                            <button id="mic-btn" class="mic-btn">
                                <i class="fa-solid fa-microphone"></i>
                            </button>
                        </div>
                        <p id="status-text" class="status-text">Tap to Speak</p>
                    </div>
                </div>
            </div>

            <!-- History View -->
            <div id="view-history" class="view-section hidden">
                <div class="history-container">
                    <div class="history-content" id="history-content">
                        Loading history...
                    </div>
                </div>
            </div>

            <!-- Settings View -->
            <div id="view-settings" class="view-section hidden">
                <div class="settings-container">
                    <div class="settings-card">
                        <h3>System Information</h3>
                        <div class="setting-row">
                            <span>Status</span>
                            <span class="badge badge-success">Online</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>
    <script src="script.js"></script>
</body>
</html>
