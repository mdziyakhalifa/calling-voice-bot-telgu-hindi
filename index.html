<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swar AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">Swar AI</div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">Conversation</a>
            </nav>
            <div class="sidebar-footer">
                <span class="status-indicator"></span>
                <span id="system-status">Checking Status...</span>
            </div>
        </aside>
        <main class="main-content">
            <header class="chat-header">
                <h2>Virtual Assistant</h2>
            </header>
            <div class="chat-container" id="chat-container">
                <div class="message bot">
                    <div class="bubble"><p>Namaste! Nenu me swar assistant ni. Aapko kaise help chahiye?</p></div>
                </div>
            </div>
            <div class="input-area">
                <div class="controls">
                    <div class="mic-wrapper">
                        <button id="mic-btn" class="mic-btn"><i class="fa-solid fa-microphone"></i></button>
                    </div>
                    <p id="status-text">Tap to Speak</p>
                </div>
                <div id="live-transcript" style="display:none"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
